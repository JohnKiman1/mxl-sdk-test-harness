name: Android Test Harness CI

on:
  push:
    branches: [ main, fix/** ]
  pull_request:

jobs:
  android-test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Java
      # =========================
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Setup Android Emulator + Run Tests
      # =========================
      - name: Run Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: |
            echo "🚀 Running Android tests..."
            ./gradlew clean connectedAndroidTest createDebugCoverageReport

      # =========================
      # 4. Upload Coverage Report
      # =========================
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/build/reports/coverage/androidTest/debug/connected/

      # =========================
      # 5. OPTIONAL: Upload Test Results (safe fallback)
      # =========================
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: app/build/outputs/androidTest-results/