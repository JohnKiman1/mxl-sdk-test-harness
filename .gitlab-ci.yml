stages:
  - build
  - test
  - report

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  ANDROID_SDK_ROOT: "/sdk"

# =========================
# 1. BUILD STAGE
# =========================
build:
  stage: build
  image: gradle:8.7-jdk17
  script:
    - ./gradlew clean assembleDebug
  artifacts:
    paths:
      - app/build/outputs/
    expire_in: 1 day

# =========================
# 2. INSTRUMENTATION TESTS
# =========================
android_test:
  stage: test
  image: gradle:8.7-jdk17

  services:
    - name: budtmo/docker-android-emulator:latest
      alias: emulator

  before_script:
    - apt-get update && apt-get install -y wget unzip adb

  script:
    - echo "🚀 Running Android instrumentation tests..."
    - ./gradlew clean connectedDebugAndroidTest createDebugCoverageReport --stacktrace

  artifacts:
    when: always
    paths:
      - app/build/reports/coverage/androidTest/
      - app/build/outputs/androidTest-results/
    expire_in: 7 days

# =========================
# 3. REPORT STAGE (SAFE ALLURE HANDLING)
# =========================
report:
  stage: report
  image: alpine:latest

  script:
    - echo "📊 Preparing test reports..."

    # Create folders safely (NO shell syntax issues)
    - mkdir -p allure-results || true

    # Copy coverage if exists
    - if [ -d "app/build/reports" ]; then cp -r app/build/reports ./reports || true; fi

    # Check if anything exists
    - if [ "$(ls -A allure-results 2>/dev/null)" ]; then echo "Allure results found"; else echo "No Allure results generated"; fi

  artifacts:
    when: always
    paths:
      - allure-results/
      - reports/
    expire_in: 7 days