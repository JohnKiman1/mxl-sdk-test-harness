stages:
  - build
  - test

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  ANDROID_SDK_ROOT: "/sdk"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

# =========================
# 1. BUILD STAGE
# =========================
build:
  stage: build
  image: gradle:8.7-jdk17

  script:
    - ./gradlew clean assembleDebug

  artifacts:
    when: always
    paths:
      - app/build/outputs/
    expire_in: 7 days


# =========================
# 2. TEST + COVERAGE STAGE
# =========================
android_test:
  stage: test
  image: gradle:8.7-jdk17

  before_script:
    - apt-get update && apt-get install -y wget unzip

    # Install Android SDK cmdline tools
    - wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
    - unzip commandlinetools-linux-*.zip -d $ANDROID_SDK_ROOT/cmdline-tools
    - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

    # Accept licenses
    - yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

    # Install required packages
    - $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36"

  script:
    # ✔ RUN TESTS + COVERAGE (CORE HARNESS STEP)
    - ./gradlew clean connectedDebugAndroidTest createDebugCoverageReport

  artifacts:
    when: always
    paths:
      - app/build/reports/
      - app/build/outputs/
    expire_in: 7 days