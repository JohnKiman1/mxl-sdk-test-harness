stages:
  - build
  - test
  - report

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  ANDROID_SDK_ROOT: "/sdk"

# =========================
# 1. BUILD STAGE
# =========================
build:
  stage: build
  image: gradle:8.7-jdk17
  script:
    - ./gradlew clean assembleDebug
  artifacts:
    paths:
      - app/build/outputs/
    expire_in: 7 days

# =========================
# 2. INSTRUMENTATION TESTS + COVERAGE
# =========================
android_test:
  stage: test
  image: gradle:8.7-jdk17

  variables:
    ANDROID_SDK_ROOT: "/sdk"
    GRADLE_OPTS: "-Dorg.gradle.daemon=false"

  before_script:
    - apt-get update && apt-get install -y wget unzip
    - wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
    - unzip commandlinetools-linux-*.zip -d $ANDROID_SDK_ROOT/cmdline-tools
    - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
    - yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
    - $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36"

  script:
    # ✔ RUN TESTS + GENERATE COVERAGE (KEY FIX)
    - ./gradlew clean connectedDebugAndroidTest createDebugCoverageReport

  artifacts:
    when: always
    paths:
      - app/build/reports/
      - app/build/outputs/
    expire_in: 7 days

# =========================
# 3. REPORT STAGE (COVERAGE ONLY)
# =========================
report:
  stage: report
  image: alpine:latest

  script:
    - echo "📊 Coverage report already generated in build artifacts"
    - ls -R app/build/reports || true

  artifacts:
    when: always
    paths:
      - app/build/reports/
    expire_in: 7 days