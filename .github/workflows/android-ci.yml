name: Android CI

on:
  push:
    branches: [ main, fix/** ]
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    timeout-minutes: 40

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # 4. Run Android emulator + tests
      - name: Run Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: |
            adb wait-for-device
            adb shell input keyevent 82 || true
            echo "🚀 Running tests..."
            ./gradlew clean connectedDebugAndroidTest --no-daemon --stacktrace

      # 5. Upload test results (SAFE PATHS)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/