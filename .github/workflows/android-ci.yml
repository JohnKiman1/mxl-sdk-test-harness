name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Java
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Cache Gradle
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # =========================
      # 4. Enable KVM
      # =========================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # =========================
      # 5. Run Emulator + Tests
      # =========================
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window -no-audio -no-snapshot -gpu swiftshader_indirect -no-boot-anim
          script: |
            echo "✅ Emulator booted"
            adb wait-for-device
            adb shell input keyevent 82 || true

            echo "🚀 Running tests..."

            ./gradlew clean connectedAndroidTest createDebugCoverageReport \
              --no-daemon --stacktrace || TESTS_FAILED=true

            echo "📥 Pulling Allure results..."
            mkdir -p allure-results

            adb pull /sdcard/allure-results ./allure-results || true

            RESULT_COUNT=$(find allure-results -name "*.json" 2>/dev/null | wc -l)
            echo "📊 Found $RESULT_COUNT Allure result file(s)"

            if [ "$RESULT_COUNT" -eq 0 ]; then
              echo "⚠️ No Allure results found — creating empty report"
              mkdir -p allure-results
            fi

            ls -la allure-results || true

            if [ "$TESTS_FAILED" = "true" ]; then
              echo "❌ Tests failed"
              exit 1
            fi

      # =========================
      # 6. Install Allure CLI
      # =========================
      - name: Install Allure CLI
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          curl -o allure.zip -L https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.zip
          unzip allure.zip
          sudo mv allure-2.30.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # =========================
      # 7. Generate Allure Report
      # =========================
      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-report
          allure generate allure-results -o allure-report --clean || echo "Empty report generated"

      # =========================
      # 8. Deploy to GitHub Pages
      # =========================
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      # =========================
      # 9. Upload artifacts
      # =========================
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/build/reports/coverage/"
          retention-days: 30

      # =========================
      # 10. Add Report Link
      # =========================
      - name: Add Report Link to Summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "### 📊 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 View Allure Report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
          echo "Report available at: $REPORT_URL"