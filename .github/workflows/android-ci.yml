name: Android CI (Allure + Pages)

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-tests:
    name: Android Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          disable-linux-hw-accel: false
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e

            echo "✅ Emulator booted"
            adb devices -l
            adb shell input keyevent 82

            echo "🚀 Running tests..."
            ./gradlew clean connectedAndroidTest --stacktrace || true

            echo "📥 Pulling Allure results..."
            adb pull /sdcard/allure-results ./allure-results || true
            # Try common alternative locations
            adb pull /data/data/$(adb shell pm list packages -3 | grep -oE '[a-zA-Z0-9.]+' | head -n 1)/files/allure-results ./allure-results || true

            echo "📂 Listing pulled results:"
            ls -la allure-results || echo "No Allure results folder found"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7


  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: android-tests
    if: always()

    steps:
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: false
          report_name: Allure Test Report

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14


  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print Report URL
        run: echo "🌐 Allure Report → ${{ steps.deployment.outputs.page_url }}"