name: Android Emulator CI

on:
  push:
    branches: [ main, fix/** ]
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "system-images;android-34;google_apis;x86_64" \
                     "emulator"

      - name: Create AVD (IMPORTANT FIX)
        run: |
          echo "no" | avdmanager create avd \
            -n ci_emulator \
            -k "system-images;android-34;google_apis;x86_64" \
            --force

      - name: Start Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim

      - name: Wait for emulator FULL BOOT (CRITICAL FIX)
        run: |
          adb wait-for-device

          echo "Waiting for boot completion..."
          boot_completed=""
          timeout=300

          while [[ "$boot_completed" != "1" && $timeout -gt 0 ]]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Boot status: $boot_completed"
            sleep 5
            timeout=$((timeout-5))
          done

          if [[ "$boot_completed" != "1" ]]; then
            echo "Emulator failed to boot in time"
            exit 1
          fi

          adb devices

      - name: Run Tests
        run: |
          ./gradlew clean test

      - name: Generate Allure Results
        run: |
          ./gradlew allureReport || true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/
            **/allure-results/
            **/build/allure-results/