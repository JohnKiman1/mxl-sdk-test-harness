name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64" \
            "emulator"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n ci_emulator \
            -k "system-images;android-34;google_apis;x86_64" \
            --force

      # === FIXED & IMPROVED STEP ===
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e  # Fail fast on any error

            echo "Waiting for device..."
            adb wait-for-device

            echo "Waiting for full boot..."
            timeout 240s bash << 'EOF'
              while true; do
                boot_status=$(adb shell getprop sys.boot_completed 2>/dev/null || echo "0")
                if [[ "$boot_status" == "1" ]]; then
                  echo "✅ Emulator fully booted!"
                  break
                fi
                echo "Still booting... (sys.boot_completed = $boot_status)"
                sleep 5
              done
            EOF

            echo "Emulator is ready!"
            adb devices -l

            # Optional: Wake/unlock screen
            adb shell input keyevent 82

            echo "Running tests..."
            ./gradlew clean connectedAndroidTest --stacktrace