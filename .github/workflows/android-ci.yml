name: Android CI Test Harness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --update
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "system-images;android-34;google_apis;x86_64" \
                     "emulator"
          yes | sdkmanager --licenses

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6"

      - name: Run Emulator & Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -no-boot-anim
            -wipe-data
            -gpu swiftshader_indirect
            -accel off
          script: |
            adb start-server

            echo "Waiting for device..."
            adb wait-for-device

            echo "Waiting for full boot..."

            BOOT_COMPLETE=""
            for i in $(seq 1 60); do
              BOOT_COMPLETE=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$BOOT_COMPLETE" = "1" ]; then
                echo "Device booted successfully"
                break
              fi
              sleep 5
            done

            adb shell input keyevent 82

            ./gradlew connectedAndroidTest

      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport || true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/
            app/build/allure-results/