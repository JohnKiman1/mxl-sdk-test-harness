name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM Group Permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64" \
            "emulator" \
            "build-tools;36.0.0"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n ci_emulator \
            -k "system-images;android-34;google_apis;x86_64" \
            --force \
            --device "pixel_5"

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          disable-linux-hw-accel: false
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e

            echo "Waiting for device..."
            adb wait-for-device

            echo "Waiting for full boot..."
            timeout 300s sh -c '
              while true; do
                if [ "$(adb shell getprop sys.boot_completed 2>/dev/null || echo 0)" = "1" ]; then
                  echo "✅ Emulator fully booted!"
                  break
                fi
                echo "Still booting..."
                sleep 8
              done
            '

            echo "Emulator ready!"
            adb devices -l
            adb shell input keyevent 82

            echo "Running instrumented tests..."
            ./gradlew clean connectedAndroidTest --stacktrace

            echo "Pulling Allure results (if any)..."
            rm -rf allure-results
            mkdir -p allure-results
            adb pull /sdcard/allure-results ./allure-results || true