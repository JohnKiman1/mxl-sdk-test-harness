name: Android Test Harness CI

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  # 🔁 Scheduled run every 1 hour
  schedule:
    - cron: "0 * * * *"

jobs:
  android-test:
    runs-on: ubuntu-latest   # ✅ FIX: stable for Android emulator CI

    steps:
      # ---------------------------
      # 1. Checkout code
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # 2. Setup Java
      # ---------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------
      # 3. Setup Android SDK
      # ---------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ---------------------------
      # 4. Run Emulator + Tests
      # ---------------------------
      - name: Run Android Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: >-
            -no-window
            -no-audio
            -gpu swiftshader_indirect
            -no-snapshot
            -no-boot-anim
          script: |
            adb wait-for-device
            ./gradlew connectedAndroidTest

      # ---------------------------
      # 5. Upload test results
      # ---------------------------
      - name: Upload Instrumentation Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: app/build/reports/androidTests/

      # ---------------------------
      # 6. Upload Allure Results (if generated later)
      # ---------------------------
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: app/build/allure-results/