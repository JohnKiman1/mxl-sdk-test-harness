name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Install required SDK components
      - name: Install SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64" \
            "emulator"

      # 5. Create AVD (IMPORTANT)
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n ci_emulator \
            -k "system-images;android-34;google_apis;x86_64" \
            --force

      # 6. Run emulator + tests (ALL-IN-ONE STEP)
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Waiting for full boot..."
            until adb shell getprop sys.boot_completed | grep -m 1 '1'; do
              sleep 5
            done

            echo "Emulator ready!"
            adb devices

            # Run your tests
            ./gradlew clean connectedAndroidTest || true

      # 7. Generate Allure report (optional)
      - name: Generate Allure Report
        run: |
          ./gradlew allureReport || true

      # 8. Upload reports (optional but recommended)
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            **/build/reports/**
            **/allure-results/**
            **/build/allure-results/**