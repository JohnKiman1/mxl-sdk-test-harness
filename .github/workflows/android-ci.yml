name: Android CI Test Harness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # JDK
      # ----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------
      # Install Android SDK tools
      # ----------------------------
      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      # ----------------------------
      # Accept licenses
      # ----------------------------
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      # ----------------------------
      # Create stable emulator manually (FIX)
      # ----------------------------
      - name: Create AVD
        run: |
          sdkmanager "system-images;android-34;google_apis;x86_64"
          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-34;google_apis;x86_64" \
            --force

      # ----------------------------
      # Start emulator (stable mode)
      # ----------------------------
      - name: Start Emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd test \
            -no-window \
            -no-audio \
            -no-snapshot \
            -gpu swiftshader_indirect \
            -accel off &

      # ----------------------------
      # Wait for boot properly (CRITICAL FIX)
      # ----------------------------
      - name: Wait for device
        run: |
          adb wait-for-device
          timeout 300 bash -c 'until adb shell getprop sys.boot_completed | grep -m 1 "1"; do sleep 5; done;'
          adb shell input keyevent 82

      # ----------------------------
      # Run tests
      # ----------------------------
      - name: Run instrumentation tests
        run: ./gradlew connectedDebugAndroidTest

      # ----------------------------
      # Allure report
      # ----------------------------
      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport || true

      # ----------------------------
      # Upload results
      # ----------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/
            app/build/allure-results/