name: Android CI Test Harness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"  # every 1 hour

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout code
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Set up JDK
      # ----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------
      # 3. Setup Android SDK
      # ----------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ----------------------------
      # 4. Create emulator (IMPORTANT FIXED CONFIG)
      # ----------------------------
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6"

      # ----------------------------
      # 5. Start emulator (CRITICAL FIX)
      #    - headless
      #    - disable snapshot
      #    - wait for boot
      # ----------------------------
      - name: Start Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 5; done;'
            adb shell input keyevent 82

      # ----------------------------
      # 6. Run tests
      # ----------------------------
      - name: Run Android Instrumentation Tests
        run: ./gradlew connectedAndroidTest

      # ----------------------------
      # 7. Generate Allure report
      # ----------------------------
      - name: Generate Allure Report
        run: |
          ./gradlew allureReport || true

      # ----------------------------
      # 8. Upload test reports
      # ----------------------------
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            app/build/reports/
            app/build/allure-results/
            app/build/outputs/androidTest-results/