name: Android CI (Enterprise Allure)

on:
  push:
    branches: [ main, fix/** ]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-tests:
    name: Android Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          disable-linux-hw-accel: false
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e

            echo "🚀 Running Android tests..."
            ./gradlew clean connectedAndroidTest --stacktrace || true

            echo "🔍 Checking for Allure results on device..."
            adb shell pm list packages -3

            echo "Searching for allure-results folder..."
            adb shell "find /sdcard /data/data -name allure-results -type d 2>/dev/null || echo 'No allure-results folder found anywhere'"

            echo "📥 Pulling Allure results (if any)..."
            adb pull /sdcard/allure-results ./allure-results || true

            PACKAGE=$(adb shell pm list packages -3 | head -n 1 | cut -d: -f2 | tr -d '\r')
            [ -n "$PACKAGE" ] && adb pull "/data/data/$PACKAGE/files/allure-results" ./allure-results || true

            echo "Final Allure status:"
            if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
              echo "✅ Allure results found ($(find allure-results -type f | wc -l) files)"
              ls -la allure-results
            else
              echo "⚠️ No Allure results were generated by the tests."
              echo "Please check your test configuration (AllureAndroidJUnitRunner, Allure listener, etc.)"
            fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7