name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # === IMPORTANT: Enable KVM for hardware acceleration ===
      - name: Enable KVM Group Permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64" \
            "emulator" \
            "build-tools;36.0.0"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n ci_emulator \
            -k "system-images;android-34;google_apis;x86_64" \
            --force \
            --device "pixel_5"

      # === Main Emulator + Test Step ===
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          disable-linux-hw-accel: false   # Let it use KVM now
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e

            echo "Waiting for device to be online..."
            adb wait-for-device

            echo "Waiting for full boot (this can take 60-120 seconds)..."
            timeout 300s bash << 'EOF'
              while true; do
                boot_status=$(adb shell getprop sys.boot_completed 2>/dev/null || echo "0")
                if [[ "$boot_status" == "1" ]]; then
                  echo "✅ Emulator fully booted!"
                  break
                fi
                echo "Still booting... (boot_completed = $boot_status)"
                sleep 8
              done
            EOF

            echo "Emulator ready!"
            adb devices -l
            adb shell input keyevent 82   # Wake screen

            echo "Running connected tests..."
            ./gradlew clean connectedAndroidTest --stacktrace