name: Android CI Test Harness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. JDK
      # ----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------
      # 3. Gradle cache (speed)
      # ----------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # ----------------------------
      # 4. Run emulator + tests
      # ----------------------------
      - name: Run Android Tests (Stable Emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6

          # IMPORTANT FIXES
          disable-animations: true
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
            -wipe-data

          script: |
            echo "Waiting for full boot..."

            # stable boot check (IMPORTANT FIX)
            adb wait-for-device

            boot_completed=""
            timeout=300
            while [ "$boot_completed" != "1" ] && [ $timeout -gt 0 ]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              echo "Boot status: $boot_completed"
              sleep 5
              timeout=$((timeout-5))
            done

            if [ "$boot_completed" != "1" ]; then
              echo "❌ Emulator failed to boot"
              adb devices
              exit 1
            fi

            echo "✅ Emulator booted successfully"

            adb shell input keyevent 82

            ./gradlew connectedAndroidTest

      # ----------------------------
      # 5. Allure report
      # ----------------------------
      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport || true

      # ----------------------------
      # 6. Upload artifacts
      # ----------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/
            app/build/allure-results/