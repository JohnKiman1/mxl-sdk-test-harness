name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Get Allure History
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: allure-history

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window -no-audio -no-snapshot -gpu swiftshader_indirect -no-boot-anim -no-metrics
          script: |
            adb kill-server
            adb start-server
            adb wait-for-device

            echo "🚀 Running tests..."

            ./gradlew clean connectedAndroidTest createDebugCoverageReport --no-daemon --stacktrace || TESTS_FAILED=true

            echo "📥 Pulling Allure results..."
            mkdir -p allure-results

            adb pull /sdcard/allure-results ./allure-results || true
            adb pull /data/data/com.your.real.package/files/allure-results ./allure-results || true

            RESULT_COUNT=$(find allure-results -name "*.json" 2>/dev/null | wc -l)
            echo "📊 Found $RESULT_COUNT Allure files"

            if [ "$TESTS_FAILED" = "true" ]; then
              exit 1
            fi

      # Install Allure manually (avoids Docker failure)
      - name: Install Allure
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl
          curl -o allure.zip -L https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.zip
          unzip allure.zip
          sudo mv allure-2.30.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-report
          if [ -d "allure-results" ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "No results found"
          fi

      - name: Merge History
        if: always()
        run: |
          if [ -d "allure-history/history" ]; then
            mkdir -p allure-report/history
            cp -r allure-history/history/* allure-report/history/ || true
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Add Report Link
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "### 📊 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[View Report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY