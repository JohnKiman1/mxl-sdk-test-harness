name: Android CI Test Harness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"  # every 1 hour

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout repository
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Set up JDK
      # ----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------
      # 3. Install Android SDK
      # ----------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ----------------------------
      # 4. Accept SDK licenses
      # ----------------------------
      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # ----------------------------
      # 5. Set stable AVD environment
      # ----------------------------
      - name: Setup AVD environment
        run: |
          echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> $GITHUB_ENV
          mkdir -p $HOME/.android/avd

      # ----------------------------
      # 6. Install system image
      # ----------------------------
      - name: Install system image
        run: |
          sdkmanager "system-images;android-34;google_apis;x86_64"

      # ----------------------------
      # 7. Create AVD (FIXED)
      # ----------------------------
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n test \
            -k "system-images;android-34;google_apis;x86_64" \
            --force

          ls $HOME/.android/avd

      # ----------------------------
      # 8. Start Emulator (stable)
      # ----------------------------
      - name: Start Emulator
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd test \
            -no-window \
            -no-audio \
            -no-snapshot \
            -gpu swiftshader_indirect \
            -accel off &

      # ----------------------------
      # 9. Wait for emulator boot
      # ----------------------------
      - name: Wait for emulator
        run: |
          adb wait-for-device
          timeout 300 bash -c 'until adb shell getprop sys.boot_completed | grep -m 1 "1"; do sleep 5; done;'
          adb shell input keyevent 82

      # ----------------------------
      # 10. Run tests
      # ----------------------------
      - name: Run instrumentation tests
        run: ./gradlew clean connectedDebugAndroidTest

      # ----------------------------
      # 11. Generate Allure report
      # ----------------------------
      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport || true

      # ----------------------------
      # 12. Upload artifacts
      # ----------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/
            app/build/allure-results/