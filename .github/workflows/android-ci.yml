name: Android CI (Allure + Pages)

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-tests:
    name: Android Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          disable-linux-hw-accel: false
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e

            echo "✅ Emulator booted"
            adb devices -l
            adb shell input keyevent 82

            echo "🚀 Running tests..."
            ./gradlew clean connectedAndroidTest --stacktrace || true

            echo "🔍 Debugging Allure results on device..."
            echo "→ Installed packages:"
            adb shell pm list packages -3

            echo "→ Checking Allure locations:"
            adb shell "ls -la /sdcard/allure-results 2>/dev/null || echo 'Not found: /sdcard/allure-results'"
            adb shell "find /data/data -name allure-results -type d 2>/dev/null || echo 'No allure-results folder found'"

            echo "📥 Pulling Allure results..."
            adb pull /sdcard/allure-results ./allure-results || true

            # Safely get package and pull
            PACKAGE=$(adb shell pm list packages -3 | head -n 1 | cut -d: -f2 | tr -d '\r')
            if [ -n "$PACKAGE" ]; then
              echo "→ Trying package: $PACKAGE"
              adb pull "/data/data/$PACKAGE/files/allure-results" ./allure-results || true
            fi

            echo "📂 Final results:"
            ls -la allure-results 2>/dev/null || echo "No Allure results folder found"