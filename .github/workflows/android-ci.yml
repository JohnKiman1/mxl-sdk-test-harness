name: Android CI

on:
  push:
    branches: [ main, fix/** ]
  pull_request:

permissions:
  contents: read
  pages: write          # ← Add
  id-token: write       # ← Add (required for Pages)

jobs:
  android-tests:
    name: Run Android Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40          # ← Good safety
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          disable-linux-hw-accel: false
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window -no-audio -no-snapshot -gpu swiftshader_indirect -no-boot-anim
          script: |
            set -e
            adb devices -l
            adb shell input keyevent 82
            
            echo "Running instrumented tests..."
            ./gradlew clean connectedAndroidTest --stacktrace

            echo "📥 Pulling Allure results..."
            rm -rf allure-results
            mkdir -p allure-results
            adb pull /sdcard/allure-results ./allure-results || true
            
            # Better fallback (improved version of your current logic)
            for pkg in $(adb shell pm list packages -3 | cut -d: -f2 | grep -E 'com\.yourcompany'); do
              adb pull "/data/data/${pkg}/files/allure-results/" "./allure-results/${pkg}/" 2>/dev/null || true
            done

            ls -la allure-results || echo "No Allure results found"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

  # ==================== ALLURE REPORT JOB ====================
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: android-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Validate results
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "⚠️ No Allure results found"
            mkdir -p allure-results
          fi

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  # ==================== DEPLOY TO GITHUB PAGES ====================
  deploy:
    name: Deploy Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'   # Only on main
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4