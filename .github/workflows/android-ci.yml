name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Java Setup
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Gradle Cache
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # =========================
      # 4. KVM
      # =========================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      # =========================
      # 5. Get gh-pages history
      # =========================
      - name: Get Allure History
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: allure-history

      # =========================
      # 6. Make test script executable
      # =========================
      - name: Make ci-test script executable
        run: chmod +x ci-test.sh

      # =========================
      # 7. Emulator + Tests
      # FIX: delegates to ci-test.sh — the emulator runner splits inline
      #      script lines into separate sh -c calls, which breaks multi-line
      #      constructs (if/fi) and loses $? between lines.
      #      A file-based script runs entirely in one shell.
      # =========================
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          script: ./ci-test.sh

      # =========================
      # 8. Allure Report
      # FIX: pinned to v1.9 instead of @master
      # =========================
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      # =========================
      # 9. Deploy Pages
      # =========================
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # =========================
      # 10. Upload artifacts
      # =========================
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/build/reports/coverage/"
          retention-days: 30

      # =========================
      # 11. Summary
      # =========================
      - name: Summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "### 📊 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 View Allure Report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY