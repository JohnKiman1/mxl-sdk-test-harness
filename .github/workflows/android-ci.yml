name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Java Setup
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Gradle Cache
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # =========================
      # 4. Enable KVM
      # =========================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      # =========================
      # 5. Get Allure History (safe)
      # =========================
      - name: Get Allure History
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: allure-history

      - name: Prepare Allure History Folder
        run: mkdir -p allure-history allure-results

      # =========================
      # 6. Emulator + Tests (FIXED + DEBUG SAFE)
      # =========================
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          script: |
            set +e

            echo "======================================"
            echo "🚀 EMULATOR START CHECK"
            echo "======================================"

            adb wait-for-device

            while [ -z "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" ]; do
              echo "⏳ Waiting for emulator boot..."
              sleep 5
            done

            echo "✅ Emulator boot completed"

            adb shell input keyevent 82 || true

            echo "======================================"
            echo "🚀 RUNNING TESTS"
            echo "======================================"

            ./gradlew clean connectedAndroidTest createDebugCoverageReport --no-daemon --stacktrace
            TEST_EXIT=$?

            echo "======================================"
            echo "📊 TEST RESULT: $TEST_EXIT"
            echo "======================================"

            echo "======================================"
            echo "📥 COLLECTING ALLURE RESULTS"
            echo "======================================"

            mkdir -p allure-results

            adb pull /sdcard/allure-results ./allure-results || true

            echo "📁 Allure folder content:"
            ls -R allure-results || true

            echo "======================================"

            if [ "$TEST_EXIT" -ne 0 ]; then
              echo "❌ TESTS FAILED"
              exit $TEST_EXIT
            else
              echo "✅ TESTS PASSED"
            fi

      # =========================
      # 7. Generate Allure Report (NO Docker)
      # =========================
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean || true

      # =========================
      # 8. Deploy GitHub Pages
      # =========================
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      # =========================
      # 9. Upload Artifacts
      # =========================
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/build/reports/coverage/"

      # =========================
      # 10. Summary
      # =========================
      - name: Summary
        if: always()
        run: |
          echo "### 📊 Report" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY