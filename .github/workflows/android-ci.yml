name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Java Setup
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Gradle Cache
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # =========================
      # 4. Enable KVM
      # =========================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      # =========================
      # 5. Fetch Allure History (SAFE)
      # =========================
      - name: Get Allure History
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: allure-history

      # Ensure folder exists (IMPORTANT FIX)
      - name: Prepare Allure History Folder
        run: mkdir -p allure-history

      # =========================
      # 6. Emulator + Tests
      # =========================
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          script: |
            set +e

            echo "🚀 Waiting for emulator..."
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 5; done;'
            adb shell input keyevent 82 || true

            echo "🚀 Running tests..."

            ./gradlew clean connectedAndroidTest createDebugCoverageReport --no-daemon --stacktrace
            TEST_EXIT=$?

            echo "📥 Creating Allure folder..."
            mkdir -p allure-results

            # SAFE: prevent failure if file doesn't exist
            adb pull /sdcard/allure-results ./allure-results || true

            echo "📊 Allure files:"
            find allure-results || true

            # IMPORTANT FIX: safe exit handling
            if [ "$TEST_EXIT" -ne 0 ]; then
              echo "❌ Tests failed"
              exit $TEST_EXIT
            fi

      # =========================
      # 7. Generate Allure Report
      # =========================
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      # =========================
      # 8. Deploy GitHub Pages
      # =========================
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

      # =========================
      # 9. Upload artifacts
      # =========================
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/build/reports/coverage/"

      # =========================
      # 10. Summary
      # =========================
      - name: Summary
        if: always()
        run: |
          echo "### 📊 Report" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY