name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Java
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Enable KVM (faster emulator)
      # =========================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # =========================
      # 4. Run Emulator + Tests
      # =========================
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window -no-audio -no-snapshot
            -gpu swiftshader_indirect -no-boot-anim
          script: |
            set -e

            echo "✅ Emulator booted"
            adb wait-for-device
            adb shell input keyevent 82 || true

            echo "🚀 Running instrumented tests..."
            ./gradlew clean connectedAndroidTest createDebugCoverageReport --no-daemon --stacktrace

            echo "📥 Pulling Allure results..."

            mkdir -p allure-results

            # Try common locations safely
            adb pull /sdcard/allure-results ./allure-results || true

            PACKAGE=$(adb shell pm list packages | grep -oE 'com\.[^ ]+' | head -1 | tr -d '\r')
            if [ -n "$PACKAGE" ]; then
              adb pull /data/data/$PACKAGE/files/allure-results ./allure-results || true
            fi

            echo "📂 Allure contents:"
            ls -la allure-results || echo "No allure-results found"

      # =========================
      # 5. Generate Allure Report
      # =========================
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: allure-history

      # =========================
      # 6. Deploy to GitHub Pages
      # =========================
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # =========================
      # 7. Upload artifacts (backup)
      # =========================
      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/coverage/

      # =========================
      # 8. Show report link
      # =========================
      - name: Add Report Link to Summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          
          echo "## 📊 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 View Allure Report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY

          echo "Report available at: $REPORT_URL"