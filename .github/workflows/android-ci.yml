name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

  # Allow manual trigger for Pages deployment
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pages: write
      id-token: write

    # Only deploy to Pages when running on main branch
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      # This condition helps with protection rules
      # You can also comment out the environment block entirely for testing

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Java Setup
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Gradle Cache
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # =========================
      # 4. Enable KVM
      # =========================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      # =========================
      # 5. Get Allure History
      # =========================
      - name: Get Allure History
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: allure-history

      - name: Prepare folders
        run: mkdir -p allure-history allure-results

      # =========================
      # 6. Emulator + Tests
      # =========================
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          script: |
            set -e && echo "==============================" && echo "🚀 EMULATOR START CHECK" && echo "==============================" && adb devices -l && echo "Waiting for device..." && adb wait-for-device && echo "Waiting for boot completion..." && BOOT=""; COUNT=0; while [ "$BOOT" != "1" ] && [ $COUNT -lt 60 ]; do BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || echo ""); echo "boot status: $BOOT (attempt $((COUNT+1))/60)"; if [ "$BOOT" != "1" ]; then sleep 5; COUNT=$((COUNT+1)); fi; done; if [ "$BOOT" != "1" ]; then echo "❌ Emulator failed to boot after 60 attempts"; adb devices -l; exit 1; fi; echo "✅ Emulator booted successfully"; adb shell input keyevent 82 || true; echo "=============================="; echo "🚀 RUNNING TESTS"; echo "=============================="; ./gradlew clean connectedAndroidTest createDebugCoverageReport --no-daemon --stacktrace; TEST_EXIT=$?; echo "=============================="; echo "📊 TEST EXIT CODE: $TEST_EXIT"; echo "=============================="; mkdir -p allure-results; echo "Pulling allure results..."; adb pull /sdcard/allure-results ./allure-results || true; echo "Allure contents:"; ls -R allure-results || true; if [ "$TEST_EXIT" -eq 0 ]; then echo "✅ TESTS PASSED"; else echo "❌ TESTS FAILED"; exit $TEST_EXIT; fi

      # =========================
      # 7. Allure Report
      # =========================
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            allure generate allure-results -o allure-report --clean
            echo "✅ Allure report generated"
          else
            echo "⚠️ No allure-results found, generating empty report"
            mkdir -p allure-report
            echo "<html><body><h1>No test results available</h1><p>Tests passed but no Allure results were generated. This may be because Allure is not configured in your test setup.</p></body></html>" > allure-report/index.html
          fi

      # =========================
      # 8. Deploy to GitHub Pages - Using peaceiris (more reliable for branch protection)
      # =========================
      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Allure report from workflow run #${{ github.run_number }}'
          # Disable Jekyll processing
          enable_jekyll: false
          # Keep old files? false means clean deploy
          keep_files: false

      # Alternative: Use the official action with different approach
      # Uncomment if peaceiris doesn't work
      # - name: Upload Pages Artifact
      #   if: always() && github.ref == 'refs/heads/main'
      #   uses: actions/upload-pages-artifact@v3
      #   with:
      #     path: allure-report
      #
      # - name: Deploy to GitHub Pages
      #   id: deployment
      #   if: always() && github.ref == 'refs/heads/main'
      #   uses: actions/deploy-pages@v4
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 9. Artifacts
      # =========================
      - name: Upload Allure Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/build/reports/coverage/"
          retention-days: 30

      # =========================
      # 10. Summary
      # =========================
      - name: Summary
        if: always()
        run: |
          echo "### 📊 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report Links:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 [Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 [Download Allure Report Artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "app/build/reports/coverage/androidTest/debug/connected/index.html" ]; then
            echo "**Coverage Report:** ✅ Generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Coverage Report:** ⚠️ Not found" >> $GITHUB_STEP_SUMMARY
          fi