name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          disable-linux-hw-accel: false
          emulator-boot-timeout: 600
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e

            echo "✅ Emulator booted successfully!"
            adb devices -l
            adb shell input keyevent 82

            echo "Running instrumented tests..."
            ./gradlew clean connectedAndroidTest --stacktrace

            echo "📥 Pulling Allure results from device..."
            adb shell mkdir -p /sdcard/allure-results || true
            adb pull /sdcard/allure-results ./allure-results || true

      # ✅ Install Allure CLI
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # ✅ Generate Allure Report
      - name: Generate Allure Report
        run: |
          if [ -d "allure-results" ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "⚠️ No Allure results found, skipping report generation"
          fi

      # ✅ Upload report as artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report