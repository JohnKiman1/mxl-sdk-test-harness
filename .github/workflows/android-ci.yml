name: Android CI (Allure + Pages)

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ==========================================
  # ANDROID TESTS
  # ==========================================
  android-tests:
    name: Android Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            set -e

            echo "✅ Emulator booted"
            adb devices -l
            adb shell input keyevent 82

            echo "🚀 Running tests..."
            ./gradlew clean connectedAndroidTest --stacktrace || true

            echo "📥 Pulling Allure results..."
            adb pull /sdcard/allure-results ./allure-results || true

            echo "📂 Listing results"
            ls -la allure-results || echo "No results found"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 5


  # ==========================================
  # ALLURE REPORT
  # ==========================================
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: android-tests
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Validate results
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "⚠️ No Allure results found, creating empty folder"
            mkdir -p allure-results
          fi

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


  # ==========================================
  # DEPLOY TO GITHUB PAGES
  # ==========================================
  deploy:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print Report URL
        run: echo "🌐 Live report → ${{ steps.deployment.outputs.page_url }}"