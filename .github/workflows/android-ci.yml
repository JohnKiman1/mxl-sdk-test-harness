name: Android CI Test Harness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"  # every 1 hour

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout code
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Set up JDK
      # ----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ----------------------------
      # 3. Setup Android SDK
      # ----------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ----------------------------
      # 4. Accept SDK licenses
      # ----------------------------
      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # ----------------------------
      # 5. Run Emulator + Tests (FIXED BOOT LOGIC)
      # ----------------------------
      - name: Run Android Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -gpu swiftshader_indirect
            -no-boot-anim
          script: |
            echo "Waiting for emulator device..."

            adb wait-for-device

            echo "Waiting for Android system boot..."
            BOOT_COMPLETED=""
            until [ "$BOOT_COMPLETED" = "1" ]; do
              BOOT_COMPLETED=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              echo "Boot status: $BOOT_COMPLETED"
              sleep 5
            done

            echo "Device fully booted. Unlocking screen..."
            adb shell input keyevent 82

            echo "Running instrumentation tests..."
            ./gradlew connectedAndroidTest

      # ----------------------------
      # 6. Generate Allure Report
      # ----------------------------
      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport || true

      # ----------------------------
      # 7. Upload Test Reports
      # ----------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/
            app/build/allure-results/