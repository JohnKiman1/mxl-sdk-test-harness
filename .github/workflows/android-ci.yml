name: Android CI

on:
  push:
    branches:
      - main
      - fix/**
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Java Setup
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Gradle Cache
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # =========================
      # 4. Enable KVM
      # =========================
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

      # =========================
      # 5. Get Allure History
      # =========================
      - name: Get Allure History
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: allure-history

      - name: Prepare folders
        run: mkdir -p allure-history allure-results

      # =========================
      # 6. Emulator + Tests (DEBUG SAFE)
      # =========================
      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: ci_emulator
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          script: |
            set -e

            echo "=============================="
            echo "🚀 EMULATOR START CHECK"
            echo "=============================="

            adb devices -l

            echo "Waiting for device..."
            adb wait-for-device

            echo "Waiting for boot completion..."
            BOOT=""
            for i in {1..60}; do
              BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              echo "boot status: $BOOT"
              if [ "$BOOT" = "1" ]; then
                break
              fi
              sleep 5
            done

            if [ "$BOOT" != "1" ]; then
              echo "❌ Emulator failed to boot"
              adb devices -l
              exit 1
            fi

            echo "✅ Emulator booted successfully"

            adb shell input keyevent 82 || true

            echo "=============================="
            echo "🚀 RUNNING TESTS"
            echo "=============================="

            ./gradlew clean connectedAndroidTest createDebugCoverageReport --no-daemon --stacktrace
            TEST_EXIT=$?

            echo "=============================="
            echo "📊 TEST EXIT CODE: $TEST_EXIT"
            echo "=============================="

            mkdir -p allure-results

            echo "Pulling allure results..."
            adb pull /sdcard/allure-results ./allure-results || true

            echo "Allure contents:"
            ls -R allure-results || true

            if [ "$TEST_EXIT" -eq 0 ]; then
              echo "✅ TESTS PASSED"
            else
              echo "❌ TESTS FAILED"
              exit $TEST_EXIT
            fi

      # =========================
      # 7. Allure Report
      # =========================
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results -o allure-report --clean || true

      # =========================
      # 8. Deploy Pages
      # =========================
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      # =========================
      # 9. Artifacts
      # =========================
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/build/reports/coverage/"

      # =========================
      # 10. Summary
      # =========================
      - name: Summary
        if: always()
        run: |
          echo "### 📊 Report" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY